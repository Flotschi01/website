services:
  react-frontend:
    container_name: react-frontend
    build:
      context: ./react-frontend
      dockerfile: ./Dockerfile.dev
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./react-frontend:/app:Z
      - /app/node_modules   # prevent host node_modules overwrite
    environment:
      - CHOKIDAR_USEPOLLING=true  # needed for file watching in Docker
      - VITE_PORT=5173